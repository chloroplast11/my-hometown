  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

Sweep 1.9s cubic-bezier(.3,.85,.35,1) .35s both}\n  .barfill{transform:scaleX(0);transform-origin:left center}\n  @keyframes growX{from{transform:scaleX(0)}to{transform:scaleX(1)}}\n  section[data-deck-active] .barfill{animation:growX 1.2s cubic-bezier(.3,.9,.3,1) .5s both}\n  @keyframes nudge{0%,100%{transform:translateX(-4px)}50%{transform:translateX(4px)}}\n  .hint-arrows{animation:nudge 1.8s ease-in-out infinite}\n  @keyframes glowPulse{0%,100%{opacity:.4}50%{opacity:.85}}\n  .spiceglow{animation:glowPulse 1.6s ease-in-out infinite}\n  .leaflet-container{background:#e7eadf !important;font-family:'Roboto Mono',monospace}\n  .leaflet-control-attribution{background:rgba(255,255,255,.62)!important;color:rgba(28,37,48,.5)!important;font-size:9px!important;padding:1px 5px!important}\n  .leaflet-control-attribution a{color:rgba(28,37,48,.72)!important}\n  .pin{position:relative;width:22px;height:22px}\n  .pin .dot{position:absolute;width:22px;height:22px;border-radius:50%;left:50%;top:50%;transform:translate(-50%,-50%);background:#cf8a2a;box-shadow:0 0 0 4px rgba(255,255,255,.9),0 0 18px 4px rgba(207,138,42,.7)}\n  .pin .ring{position:absolute;width:22px;height:22px;border-radius:50%;left:50%;top:50%;border:3px solid #cf8a2a;transform:translate(-50%,-50%) scale(.6)}\n  @keyframes ring{0%{transform:translate(-50%,-50%) scale(.6);opacity:.8}100%{transform:translate(-50%,-50%) scale(3.6);opacity:0}}\n  .pin-home .ring{animation:ring 2.2s ease-out infinite}\n  .pin-ref .dot{width:13px;height:13px;background:#5b6b7a;box-shadow:0 0 0 3px rgba(255,255,255,.9)}\n  .pinlabel{font-family:'Noto Sans JP',sans-serif;font-weight:700;font-size:32px;color:#1c2530;white-space:nowrap;text-shadow:0 2px 4px rgba(255,255,255,.95),0 0 12px rgba(255,255,255,.9),0 0 20px rgba(255,255,255,.7)}\n  .pinlabel.ref{color:rgba(28,37,48,.7);font-weight:500;font-size:21px}\n  .mapstep{font-family:'Noto Sans JP',sans-serif;font-weight:700;font-size:24px;letter-spacing:.08em;color:rgba(28,37,48,.5);padding:9px 22px;border-radius:999px;background:rgba(255,255,255,.55);border:1px solid rgba(28,37,48,.14);transition:all .45s cubic-bezier(.3,.8,.3,1);white-space:nowrap}\n  .mapstep[data-on=\"1\"]{color:#fff;background:#cf8a2a;border-color:#cf8a2a;box-shadow:0 6px 20px rgba(207,138,42,.4)}\n  .mapstep[data-done=\"1\"]{color:#cf8a2a;background:rgba(207,138,42,.12);border-color:rgba(207,138,42,.4)}\n  .stepsep{font-family:'Roboto Mono',monospace;font-size:22px;color:rgba(28,37,48,.32)}\n  @keyframes hl{0%,100%{opacity:.55}50%{opacity:.95}}\n  .regionlabel{font-family:'Noto Serif JP',serif;font-weight:900;color:#b9701d;white-space:nowrap;text-shadow:0 2px 6px rgba(255,255,255,.95),0 0 16px rgba(255,255,255,.85);letter-spacing:.06em}\n<\u002Fstyle>\n<\u002Fhelmet>\n<x-import component-from-global-scope=\"deck-stage\" from=\"025a82f1-c12a-408c-ab4a-146d6320b57c#/deck-stage.js\" width=\"1920\" height=\"1080\" hint-size=\"100%,100%\">\n\n  <section id=\"titleSlide\" data-label=\"Title\" data-speaker-notes=\"皆さん、こんにちは。今日は、私のおすすめの場所——私の故郷を紹介します。中国の江西省にある、萍郷（ピンシャン）という小さな町です。\" style=\"background:#15110d;color:#fff;font-family:'Noto Sans JP',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;text-align:center;\">\n    <div style=\"position:absolute;inset:0;pointer-events:none;background:radial-gradient(72% 58% at 50% 46%, rgba(8,9,16,.62) 0%, rgba(8,9,16,.18) 58%, transparent 100%), linear-gradient(180deg, rgba(8,9,16,.5) 0%, rgba(8,9,16,.12) 30%, rgba(8,9,16,.58) 100%);\"><\u002Fdiv>\n    <div style=\"position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;\">\n    <div class=\"fade\" style=\"font-family:'Roboto Mono',monospace;font-size:22px;letter-spacing:.55em;color:#f3b65a;text-transform:uppercase;padding-left:.55em;text-shadow:0 2px 14px rgba(0,0,0,.5);\">My Hometown<\u002Fdiv>\n    <div class=\"fade\" style=\"animation-delay:.12s;font-size:26px;letter-spacing:.32em;color:rgba(255,255,255,.82);margin-top:18px;text-shadow:0 2px 14px rgba(0,0,0,.5);\">わたしのおすすめの場所<\u002Fdiv>\n    <div class=\"fade\" style=\"animation-delay:.28s;font-family:'Noto Serif JP',serif;font-weight:900;font-size:240px;line-height:1;letter-spacing:.04em;margin:26px 0 8px;color:#ffffff;text-shadow:0 6px 40px rgba(0,0,0,.55);\">\n      <ruby>萍郷<rt style=\"font-size:34px;color:rgba(255,255,255,.6);\">ピンシャン<\u002Frt><\u002Fruby>\n    <\u002Fdiv>\n    <div class=\"fade\" style=\"animation-delay:.42s;display:flex;align-items:center;gap:22px;font-size:30px;letter-spacing:.18em;color:rgba(255,255,255,.9);text-shadow:0 2px 14px rgba(0,0,0,.5);\">\n      <span style=\"width:46px;height:1px;background:rgba(255,255,255,.42)\"><\u002Fspan>\n      中国 ・ 江西省\n      <span style=\"width:46px;height:1px;background:rgba(255,255,255,.42)\"><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"fade\" style=\"animation-delay:.56s;font-family:'Roboto Mono',monospace;font-size:16px;letter-spacing:.3em;color:rgba(255,255,255,.6);margin-top:30px;text-shadow:0 2px 12px rgba(0,0,0,.5);\">27.62°N&nbsp;&nbsp;113.85°E<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Location\" data-speaker-notes=\"まず、場所です。これが中国全体。右上に見えるのが日本の東京です。矢印キーを押すと、まず江西省にズームします。ここが私の省です。もう一度押すと、萍郷市へ。中国の南東部、山に囲まれた小さな町です。\" style=\"background:#e7eadf;color:#1c2530;font-family:'Noto Sans JP',sans-serif;overflow:hidden;\">\n    <div id=\"map\" style=\"position:absolute;inset:0;z-index:0;\"><\u002Fdiv>\n    <div style=\"position:absolute;inset:0;pointer-events:none;background:radial-gradient(135% 115% at 50% 50%, transparent 58%, rgba(236,240,243,.6) 100%)\"><\u002Fdiv>\n    <div style=\"position:absolute;inset:0;pointer-events:none;background:linear-gradient(155deg, rgba(245,249,252,.78) 0%, rgba(245,249,252,.3) 24%, transparent 44%)\"><\u002Fdiv>\n    <div style=\"position:absolute;top:64px;left:72px;pointer-events:none;\">\n      <div class=\"fade\" style=\"font-family:'Roboto Mono',monospace;font-size:18px;letter-spacing:.42em;color:#cf8a2a;text-transform:uppercase;\">01 — Location<\u002Fdiv>\n      <div class=\"fade\" style=\"animation-delay:.12s;font-family:'Noto Serif JP',serif;font-weight:700;font-size:78px;line-height:1.08;margin-top:14px;color:#19222c;text-shadow:0 2px 16px rgba(255,255,255,.85);\">私の<ruby>故郷<rt style=\"font-size:18px;\">こきょう<\u002Frt><\u002Fruby>は、ここ<\u002Fdiv>\n      <div class=\"fade\" style=\"animation-delay:.24s;font-size:26px;color:rgba(28,37,48,.82);margin-top:14px;letter-spacing:.06em;text-shadow:0 1px 10px rgba(255,255,255,.9);\">中国 ・ <ruby>江西省<rt style=\"font-size:13px;\">こうせいしょう<\u002Frt><\u002Fruby> ・ <ruby>萍郷市<rt style=\"font-size:13px;\">ピンシャンし<\u002Frt><\u002Fruby><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"position:absolute;bottom:56px;left:50%;transform:translateX(-50%);pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:18px;\">\n      <div id=\"mapSteps\" style=\"display:flex;align-items:center;gap:16px;\">\n        <div class=\"mapstep\" data-stage=\"0\" data-on=\"1\"><ruby>中国<rt style=\"font-size:11px;font-family:'Noto Sans JP';\">ちゅうごく<\u002Frt><\u002Fruby><\u002Fdiv>\n        <span class=\"stepsep\">›<\u002Fspan>\n        <div class=\"mapstep\" data-stage=\"1\"><ruby>江西省<rt style=\"font-size:11px;font-family:'Noto Sans JP';\">こうせいしょう<\u002Frt><\u002Fruby><\u002Fdiv>\n        <span class=\"stepsep\">›<\u002Fspan>\n        <div class=\"mapstep\" data-stage=\"2\"><ruby>萍郷市<rt style=\"font-size:11px;font-family:'Noto Sans JP';\">ピンシャンし<\u002Frt><\u002Fruby><\u002Fdiv>\n      <\u002Fdiv>\n      <div id=\"mapHint\" class=\"hint-arrows\" style=\"display:flex;align-items:center;gap:10px;font-family:'Roboto Mono',monospace;font-size:17px;letter-spacing:.18em;color:rgba(28,37,48,.62);text-shadow:0 1px 8px rgba(255,255,255,.95);\">\n        <span style=\"font-size:20px;color:#cf8a2a;\">→<\u002Fspan> <span id=\"mapHintText\">キーで江西省へズーム<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Scenery\" data-speaker-notes=\"これが、私の自慢の場所、武功山です。標高およそ1,900メートル。山の上に広がる草原と、雲の海——雲海が、本当にきれいです。\" style=\"background:#cfe0ec;color:#1c2530;font-family:'Noto Sans JP',sans-serif;overflow:hidden;\">\n    <div id=\"wugongWrap\" style=\"position:absolute;inset:0;overflow:hidden;\">\n      <img id=\"wugongImg\" alt=\"武功山\" style=\"position:absolute;top:50%;left:50%;width:120%;height:120%;object-fit:cover;transform:translate(-50%,-50%);will-change:transform;user-select:none;-webkit-user-drag:none;pointer-events:none;\">\n<\u002Fdiv>\n    <div style=\"position:absolute;inset:0;pointer-events:none;background:linear-gradient(155deg, rgba(245,249,252,.72) 0%, rgba(245,249,252,.26) 26%, transparent 48%)\"><\u002Fdiv>\n    <div style=\"position:absolute;top:64px;left:72px;pointer-events:none;\">\n      <div class=\"fade\" style=\"font-family:'Roboto Mono',monospace;font-size:18px;letter-spacing:.42em;color:#1f7d54;text-transform:uppercase;\">02 — Scenery<\u002Fdiv>\n      <div class=\"fade\" style=\"animation-delay:.12s;font-family:'Noto Serif JP',serif;font-weight:700;font-size:90px;line-height:1.05;margin-top:14px;color:#16202a;text-shadow:0 2px 14px rgba(255,255,255,.75);\"><ruby>武功山<rt style=\"font-size:20px;\">ぶこうざん<\u002Frt><\u002Fruby><\u002Fdiv>\n      <div class=\"fade\" style=\"animation-delay:.24s;font-size:30px;color:#28333f;margin-top:10px;letter-spacing:.1em;text-shadow:0 1px 10px rgba(255,255,255,.85);\"><ruby>雲海<rt style=\"font-size:15px;\">うんかい<\u002Frt><\u002Fruby> ・ <ruby>標高<rt style=\"font-size:15px;\">ひょうこう<\u002Frt><\u002Fruby> 1,918m<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Food\" data-speaker-notes=\"最後に、料理です。萍郷の料理は、とにかく辛い！中国でも一番辛いと言われています。日本の激辛より、ずっと上です。おすすめは、蓮花血鴨と、萍郷炒粉です。\" style=\"background:radial-gradient(120% 100% at 16% 0%, #fdeee5 0%, #f7efe5 50%, #f1ebe1 100%);color:#1c2530;font-family:'Noto Sans JP',sans-serif;overflow:hidden;display:flex;align-items:center;\">\n    <div style=\"width:700px;flex:none;padding:0 0 0 76px;\">\n      <div class=\"fade\" style=\"font-family:'Roboto Mono',monospace;font-size:18px;letter-spacing:.42em;color:#d9442f;text-transform:uppercase;\">03 — Food<\u002Fdiv>\n      <div class=\"fade\" style=\"animation-delay:.12s;font-family:'Noto Serif JP',serif;font-weight:700;font-size:78px;line-height:1.1;margin-top:14px;color:#19222c;\">萍郷の<ruby>料理<rt style=\"font-size:18px;\">りょうり<\u002Frt><\u002Fruby>は<br><span style=\"color:#d9442f;\">とても<ruby>辛<rt style=\"font-size:18px;\">から<\u002Frt><\u002Fruby>い！<\u002Fspan><\u002Fdiv>\n      <div style=\"position:relative;margin-top:40px;width:440px;\">\n        <div class=\"spiceglow\" style=\"position:absolute;right:8px;top:64px;width:110px;height:110px;border-radius:50%;background:radial-gradient(circle, rgba(217,68,47,.38), transparent 70%);pointer-events:none;\"><\u002Fdiv>\n        <svg viewBox=\"0 0 400 230\" style=\"width:420px;height:auto;overflow:visible;display:block;\">\n          <defs><linearGradient id=\"spice\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"0\">\n            <stop offset=\"0\" stop-color=\"#2f9e6f\"><\u002Fstop><stop offset=\"0.5\" stop-color=\"#e0a32f\"><\u002Fstop><stop offset=\"1\" stop-color=\"#d9442f\"><\u002Fstop>\n          <\u002FlinearGradient><\u002Fdefs>\n          <path d=\"M40,200 A160,160 0 0 1 360,200\" fill=\"none\" stroke=\"rgba(28,37,48,0.1)\" stroke-width=\"30\" stroke-linecap=\"round\"><\u002Fpath>\n          <path d=\"M40,200 A160,160 0 0 1 360,200\" fill=\"none\" stroke=\"url(#spice)\" stroke-width=\"26\" stroke-linecap=\"round\"><\u002Fpath>\n          <g class=\"needle\"><line x1=\"200\" y1=\"200\" x2=\"200\" y2=\"66\" stroke=\"#19222c\" stroke-width=\"6\" stroke-linecap=\"round\"><\u002Fline><\u002Fg>\n          <circle cx=\"200\" cy=\"200\" r=\"14\" fill=\"#19222c\"><\u002Fcircle>\n          <circle cx=\"200\" cy=\"200\" r=\"6\" fill=\"#f7efe5\"><\u002Fcircle>\n          <text x=\"34\" y=\"226\" fill=\"rgba(28,37,48,.55)\" font-family=\"Noto Sans JP\" font-size=\"17\">マイルド<\u002Ftext>\n          <text x=\"316\" y=\"226\" fill=\"#d9442f\" font-family=\"Noto Sans JP\" font-weight=\"700\" font-size=\"19\">激辛<\u002Ftext>\n        <\u002Fsvg>\n        <div style=\"font-family:'Roboto Mono',monospace;letter-spacing:.3em;color:rgba(28,37,48,.5);font-size:14px;text-align:center;margin-top:2px;\">辛さレベル / SPICE<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:34px;width:480px;\">\n        <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:14px;\">\n          <span style=\"width:130px;font-size:18px;color:rgba(28,37,48,.72);\">日本の激辛<\u002Fspan>\n          <span style=\"flex:1;height:16px;border-radius:8px;background:rgba(28,37,48,.1);overflow:hidden;\"><span class=\"barfill\" style=\"display:block;height:100%;width:40%;background:#e0a32f;border-radius:8px;\"><\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:14px;\">\n          <span style=\"width:130px;font-size:18px;font-weight:700;color:#d9442f;\">萍郷<\u002Fspan>\n          <span style=\"flex:1;height:16px;border-radius:8px;background:rgba(28,37,48,.1);overflow:hidden;\"><span class=\"barfill\" style=\"display:block;height:100%;width:100%;background:linear-gradient(90deg,#e0a32f,#d9442f);border-radius:8px;animation-delay:.8s;\"><\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1;padding:0 76px 0 44px;display:flex;gap:30px;\">\n      <div class=\"fade\" style=\"animation-delay:.3s;flex:1;\">\n        <img id=\"foodImg1\" alt=\"蓮花血鴨\" style=\"width:100%;height:430px;display:block;object-fit:cover;border-radius:16px;border:1px solid rgba(28,37,48,.14);box-shadow:0 14px 36px rgba(28,37,48,.12);\">\n        <div style=\"font-family:'Noto Serif JP',serif;font-weight:700;font-size:30px;margin-top:18px;color:#19222c;\"><ruby>蓮花血鴨<rt style=\"font-size:14px;font-family:'Noto Sans JP';\">レンファ・シュエヤー<\u002Frt><\u002Fruby><\u002Fdiv>\n        <div style=\"font-size:18px;color:rgba(28,37,48,.62);margin-top:6px;\">鴨肉の激辛炒め<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"fade\" style=\"animation-delay:.42s;flex:1;\">\n        <img id=\"foodImg2\" alt=\"萍郷炒粉\" style=\"width:100%;height:430px;display:block;object-fit:cover;border-radius:16px;border:1px solid rgba(28,37,48,.14);box-shadow:0 14px 36px rgba(28,37,48,.12);\">\n        <div style=\"font-family:'Noto Serif JP',serif;font-weight:700;font-size:30px;margin-top:18px;color:#19222c;\"><ruby>萍郷炒粉<rt style=\"font-size:14px;font-family:'Noto Sans JP';\">ピンシャン・チャオフェン<\u002Frt><\u002Fruby><\u002Fdiv>\n        <div style=\"font-size:18px;color:rgba(28,37,48,.62);margin-top:6px;\">ピリ辛の焼きビーフン<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Outro\" data-speaker-notes=\"ぜひ一度、萍郷に遊びに来てください。ご清聴、ありがとうございました。\" style=\"background:radial-gradient(125% 95% at 50% 92%, #fdf3e6 0%, #f3f0ea 45%, #e9eae6 100%);color:#1c2530;font-family:'Noto Sans JP',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;overflow:hidden;\">\n    <div class=\"fade\" style=\"font-family:'Roboto Mono',monospace;font-size:20px;letter-spacing:.5em;color:#cf8a2a;text-transform:uppercase;padding-left:.5em;\">Come visit<\u002Fdiv>\n    <div class=\"fade\" style=\"animation-delay:.14s;font-family:'Noto Serif JP',serif;font-weight:900;font-size:140px;line-height:1.05;margin:28px 0 18px;color:#19222c;\">ぜひ、<span style=\"color:#1f7d54;\">萍郷<\u002Fspan>へ！<\u002Fdiv>\n    <div class=\"fade\" style=\"animation-delay:.3s;font-size:34px;letter-spacing:.14em;color:rgba(28,37,48,.8);\">ご<ruby>清聴<rt style=\"font-size:16px;\">せいちょう<\u002Frt><\u002Fruby>、ありがとうございました<\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fx-import>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;}}\">\nclass Component extends DCLogic {\n  renderVals() { return {}; }\n\n  componentDidMount() {\n    // Safety net: deck-stage clears its fonts-pending gate inside requestAnimationFrame,\n    // which never fires while the iframe is backgrounded. Force-reveal on a plain timer.\n    setTimeout(() => {\n      const ds = document.querySelector('deck-stage');\n      if (ds) ds.removeAttribute('data-fonts-pending');\n    }, 1500);\n    this._initMapWhenReady();\n    this._wireSlideChange();\n    this._applyExternalImages();\n  }\n\n  // Images are kept as EXTERNAL files (images/ folder beside this HTML) rather\n  // than inlined, so they're referenced here as runtime strings the bundler\n  // can't see. Resolved relative to the HTML document location. Polls because\n  // deck-stage projects the slides into the DOM after mount.\n  _applyExternalImages() {\n    // Inject the web-font stylesheet at runtime so the bundler doesn't embed\n    // the (very large) CJK font files — they load from Google Fonts instead,\n    // keeping this HTML small.\n    if (!document.getElementById('__runtimeFonts')) {\n      const fl = document.createElement('link');\n      fl.id = '__runtimeFonts';\n      fl.rel = 'stylesheet';\n      fl.href = 'https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700&family=Roboto+Mono:wght@400;500&display=swap';\n      document.head.appendChild(fl);\n    }\n    const ts = document.getElementById('titleSlide');\n    const wi = document.getElementById('wugongImg');\n    const f1 = document.getElementById('foodImg1');\n    const f2 = document.getElementById('foodImg2');\n    if (!ts || !wi || !f1 || !f2) { setTimeout(() => this._applyExternalImages(), 120); return; }\n    ts.style.background = \"#15110d center/cover no-repeat url('https://res.cloudinary.com/dcp4mr6x6/image/upload/v1782046706/pingxiang-city_mfktdf.png')\";\n    wi.src = 'https://res.cloudinary.com/dcp4mr6x6/image/upload/v1782046705/wugong_cgqmcu.jpg';\n    f1.src = 'https://res.cloudinary.com/dcp4mr6x6/image/upload/v1782046705/food-blood-duck_urkuzn.webp';\n    f2.src = 'https://res.cloudinary.com/dcp4mr6x6/image/upload/v1782046704/food-fried-noodle_y3tqhc.webp';\n  }\n\n  _wireSlideChange() {\n    const stage = document.querySelector('deck-stage');\n    if (!stage) { setTimeout(() => this._wireSlideChange(), 120); return; }\n    this._stage = stage;\n    this._curIndex = -1;\n    stage.addEventListener('slidechange', (e) => {\n      const idx = (e && e.detail) ? e.detail.index : -1;\n      this._curIndex = idx;\n      if (idx === 1) this._setStage(0, false); // reset to China overview on entry\n    });\n    // Capture-phase key handler runs BEFORE deck-stage's window listener, so on\n    // the Location slide we can hijack the arrow keys to step the map zoom\n    // (中国 → 江西省 → 萍郷) before they would advance the deck.\n    if (!this._keyBound) {\n      this._keyBound = true;\n      window.addEventListener('keydown', this._onMapKey, true);\n    }\n  }\n\n  _onMapKey = (e) => {\n    if (this._curIndex !== 1) return;\n    if (e.metaKey || e.ctrlKey || e.altKey) return;\n    const t = e.target;\n    if (t && (t.isContentEditable || /^(INPUT|TEXTAREA|SELECT)$/.test(t.tagName))) return;\n    const fwd = (e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ' || e.key === 'Spacebar');\n    const back = (e.key === 'ArrowLeft' || e.key === 'PageUp');\n    if (fwd && this._stageIdx < 2) {\n      e.preventDefault(); e.stopImmediatePropagation();\n      this._setStage(this._stageIdx + 1, true);\n    } else if (back && this._stageIdx > 0) {\n      e.preventDefault(); e.stopImmediatePropagation();\n      this._setStage(this._stageIdx - 1, true);\n    }\n    // exhausted in either direction → let deck-stage move to the next/prev slide\n  };\n\n  _initMapWhenReady() {\n    if (!window.L) { setTimeout(() => this._initMapWhenReady(), 120); return; }\n    const el = document.getElementById('map');\n    if (!el) { setTimeout(() => this._initMapWhenReady(), 120); return; }\n    const L = window.L;\n    const map = L.map(el, {\n      zoomControl: false, attributionControl: true, dragging: false,\n      scrollWheelZoom: false, doubleClickZoom: false, boxZoom: false,\n      keyboard: false, zoomSnap: 0.25, worldCopyJump: false,\n    });\n    // Terrain / topographic tiles — hill-shading makes the mountains around\n    // 萍郷 clearly visible.\n    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', {\n      maxZoom: 18, keepBuffer: 4,\n      attribution: 'Tiles © Esri',\n    }).addTo(map);\n\n    this._home = [27.62, 113.85];\n    // China + Tokyo framing for the overview stage\n    this._chinaBounds = L.latLngBounds([[18.5, 79], [44.5, 142]]);\n    // fallbacks used if the boundary GeoJSON fails to load\n    this._jxBounds = L.latLngBounds([[24.4, 113.4], [30.2, 118.6]]);\n    this._pxBounds = L.latLngBounds([[27.25, 113.45], [28.1, 114.45]]);\n\n    L.marker(this._home, { icon: L.divIcon({ className: '', html: '<div class=\"pin pin-home\"><span class=\"ring\"><\u002Fspan><span class=\"dot\"><\u002Fspan><\u002Fdiv>', iconSize: [22, 22], iconAnchor: [11, 11] }), interactive: false }).addTo(map);\n    L.marker(this._home, { icon: L.divIcon({ className: '', html: '<div class=\"pinlabel\">萍郷<\u002Fdiv>', iconSize: [130, 40], iconAnchor: [-20, 22] }), interactive: false }).addTo(map);\n\n    const tokyo = [35.68, 139.76];\n    L.marker(tokyo, { icon: L.divIcon({ className: '', html: '<div class=\"pin pin-ref\"><span class=\"dot\"><\u002Fspan><\u002Fdiv>', iconSize: [13, 13], iconAnchor: [6.5, 6.5] }), interactive: false }).addTo(map);\n    L.marker(tokyo, { icon: L.divIcon({ className: '', html: '<div class=\"pinlabel ref\">東京<\u002Fdiv>', iconSize: [90, 28], iconAnchor: [-12, 15] }), interactive: false }).addTo(map);\n\n    this._map = map;\n    this._loadRegion('https://geo.datav.aliyun.com/areas_v3/bound/360000.json', 'jx', '江西省');\n    this._loadRegion('https://geo.datav.aliyun.com/areas_v3/bound/360300.json', 'px', null);\n\n    setTimeout(() => map.invalidateSize(), 200);\n    this._setStage(0, false);\n    // Pre-warm tiles for the Jiangxi (stage 1) and Pingxiang (stage 2)\n    // viewports plus the intermediate zooms a flyToBounds animation will\n    // touch, so demo transitions hit the browser cache instead of the network.\n    setTimeout(() => {\n      const tileURL = (z, x, y) => 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/' + z + '/' + y + '/' + x;\n      const preload = (bounds, zoom) => {\n        const nw = map.project(bounds.getNorthWest(), zoom).divideBy(256).floor();\n        const se = map.project(bounds.getSouthEast(), zoom).divideBy(256).floor();\n        for (let x = nw.x; x <= se.x; x++) {\n          for (let y = nw.y; y <= se.y; y++) {\n            const img = new Image(); img.src = tileURL(zoom, x, y);\n          }\n        }\n      };\n      for (const z of [5, 6, 7, 8]) preload(this._jxBounds, z);\n      for (const z of [9, 10, 11]) preload(this._pxBounds, z);\n    }, 400);\n  }\n\n  async _loadRegion(url, key, labelText) {\n    const L = window.L;\n    try {\n      const res = await fetch(url);\n      const gj = await res.json();\n      const layer = L.geoJSON(gj, { interactive: false, style: { color: '#cf8a2a', weight: 2, fillColor: '#cf8a2a', fillOpacity: 0.12 } });\n      this['_' + key + 'Layer'] = layer;\n      this['_' + key + 'Bounds'] = layer.getBounds();\n      if (labelText) {\n        const b = layer.getBounds();\n        const c = b.getCenter();\n        const latPt = [b.getNorth() - (b.getNorth() - b.getSouth()) * 0.22, c.lng];\n        this['_' + key + 'Label'] = L.marker(latPt, { icon: L.divIcon({ className: '', html: '<div class=\"regionlabel\" style=\"font-size:54px;\">' + labelText + '<\u002Fdiv>', iconSize: [200, 60], iconAnchor: [100, 30] }), interactive: false });\n      }\n      // re-apply the current stage now that geometry exists\n      if ((key === 'jx' && this._stageIdx === 1) || (key === 'px' && this._stageIdx === 2)) {\n        this._setStage(this._stageIdx, true);\n      }\n    } catch (err) { /* fall back to hardcoded bounds */ }\n  }\n\n  _setStage(idx, animate) {\n    this._stageIdx = idx;\n    this._updateStepper(idx);\n    if (!this._map) return;\n    const map = this._map;\n    map.stop();\n    this._applyRegions(idx);\n    if (idx === 0) {\n      if (animate) map.flyToBounds(this._chinaBounds, { duration: 1.9, easeLinearity: 0.25, paddingTopLeft: [120, 150], paddingBottomRight: [120, 200] });\n      else map.fitBounds(this._chinaBounds, { animate: false, paddingTopLeft: [120, 150], paddingBottomRight: [120, 200] });\n    } else if (idx === 1) {\n      const layer = this._jxLayer;\n      this._flyTo(layer ? layer.getBounds() : this._jxBounds, animate, 10);\n    } else if (idx === 2) {\n      const layer = this._pxLayer;\n      this._flyTo(layer ? layer.getBounds() : this._pxBounds, animate, 12);\n    }\n  }\n\n  _flyTo(bounds, animate, maxZoom) {\n    const map = this._map;\n    const opts = { paddingTopLeft: [140, 170], paddingBottomRight: [140, 210], maxZoom: maxZoom };\n    if (animate) map.flyToBounds(bounds, Object.assign({ duration: 2.3, easeLinearity: 0.25 }, opts));\n    else map.fitBounds(bounds, Object.assign({ animate: false }, opts));\n  }\n\n  _applyRegions(idx) {\n    const map = this._map;\n    const off = (l) => { if (l && map.hasLayer(l)) map.removeLayer(l); };\n    const on = (l, style) => { if (!l) return; if (!map.hasLayer(l)) l.addTo(map); l.setStyle(style); l.bringToFront(); };\n    // Jiangxi: highlighted at stage 1, faint outline at stage 2, hidden at 0\n    if (idx === 1) on(this._jxLayer, { color: '#cf8a2a', weight: 3, fillColor: '#cf8a2a', fillOpacity: 0.14, dashArray: null });\n    else if (idx === 2) on(this._jxLayer, { color: 'rgba(207,138,42,.55)', weight: 1.5, fillColor: '#cf8a2a', fillOpacity: 0.04, dashArray: '4 6' });\n    else off(this._jxLayer);\n    // Pingxiang: highlighted only at stage 2\n    if (idx === 2) on(this._pxLayer, { color: '#b9701d', weight: 3.5, fillColor: '#cf8a2a', fillOpacity: 0.22, dashArray: null });\n    else off(this._pxLayer);\n    // 江西省 label only at stage 1\n    if (this._jxLabel) { if (idx === 1) { if (!map.hasLayer(this._jxLabel)) this._jxLabel.addTo(map); } else off(this._jxLabel); }\n  }\n\n  _updateStepper(idx) {\n    const steps = document.querySelectorAll('#mapSteps .mapstep');\n    steps.forEach((s) => {\n      const n = parseInt(s.getAttribute('data-stage'), 10);\n      s.setAttribute('data-on', n === idx ? '1' : '0');\n      s.setAttribute('data-done', n < idx ? '1' : '0');\n    });\n    const hint = document.getElementById('mapHintText');\n    const wrap = document.getElementById('mapHint');\n    if (hint) hint.textContent = idx === 0 ? 'キーで江西省へズーム' : idx === 1 ? 'キーで萍郷市へズーム' : 'これが私の故郷、萍郷市です';\n    if (wrap) {\n      const arrow = wrap.querySelector('span');\n      if (idx === 2) { wrap.classList.remove('hint-arrows'); if (arrow) arrow.style.display = 'none'; }\n      else { wrap.classList.add('hint-arrows'); if (arrow) arrow.style.display = ''; }\n    }\n  }\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
